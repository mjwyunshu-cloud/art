<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>艺术原型：人格图谱测试</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-start: #F4F2F7;
            --bg-end: #E4E0ED;
            --text-main: #3C3A4D; 
            --accent-purple: #9281C3; 
            --deep-purple: #5B4D8A;
            --dot-red: #D62828;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background: radial-gradient(circle at center, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* 颗粒感叠层 */
        .noise-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: multiply;
            opacity: 0.12;
            filter: url(#riso-grain);
            background-color: var(--accent-purple);
        }

        .paper-texture {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.04;
            z-index: 10;
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
        }

        .animate-fade-in { animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .dotted-path {
            stroke-dasharray: 2 8;
            stroke-linecap: round;
            fill: none;
            stroke: var(--accent-purple);
            stroke-width: 0.6;
            opacity: 0.2;
            animation: dash-flow 80s linear infinite;
        }
        @keyframes dash-flow { to { stroke-dashoffset: -1000; } }

        .floating-dot {
            transition: all 1s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* 选项按钮：移除“框”，追求极致流畅 */
        .option-btn {
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            border-bottom: 1px solid rgba(146, 129, 195, 0.15);
            text-align: left;
            padding: 0.7rem 0;
            width: 100%;
            outline: none;
            background: transparent;
            position: relative;
        }
        @media (min-width: 768px) { .option-btn { padding: 1.1rem 0; } }
        
        /* 点击时的极简反馈，不再出现框 */
        .option-btn.selected { 
            color: var(--accent-purple);
            padding-left: 0.8rem;
            border-bottom-color: var(--accent-purple);
        }

        /* 极速切题动画 */
        .q-wrapper { transition: opacity 0.25s ease-out, transform 0.25s cubic-bezier(0.23, 1, 0.32, 1); }
        .q-fadeOut { opacity: 0; transform: scale(0.99) translateY(-5px); }
        .q-fadeIn { opacity: 1; transform: scale(1) translateY(0); }

        .mask-center-void {
            mask-image: radial-gradient(circle, transparent 20%, black 65%);
            -webkit-mask-image: radial-gradient(circle, transparent 20%, black 65%);
        }

        .btn-start {
            border: 1px solid var(--deep-purple);
            padding: 0.6rem 2.5rem;
            letter-spacing: 0.5em;
            font-size: 10px;
            font-weight: 700;
            transition: all 0.4s ease;
            background: rgba(255,255,255,0.4);
            color: var(--deep-purple);
            text-transform: uppercase;
            backdrop-filter: blur(10px);
        }

        .btn-start:hover {
            background: var(--deep-purple);
            color: white;
        }

        .spectrum-line {
            fill: none;
            stroke: var(--dot-red);
            stroke-width: 1.5;
            transition: all 0.5s ease;
        }

        .status-log {
            font-family: ui-monospace, monospace;
            font-size: 8px;
            color: var(--accent-purple);
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }

        .serif { font-family: 'Noto Serif SC', serif; }
        .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    </style>
</head>
<body>
    <svg style="position: absolute; width: 0; height: 0;">
        <filter id="riso-grain">
            <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch" />
            <feColorMatrix type="matrix" values="0 0 0 0 0.4 0 0 0 0 0.3 0 0 0 0 0.6 0 0 0 0 0.3 0" />
        </filter>
    </svg>

    <div class="paper-texture"></div>
    <div class="noise-overlay"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const ARTISTS = {
            DA_VINCI: { name: "Da Vinci / 达·芬奇", sub: "全知全能的理性圣徒", identity: "你在严密的观察中拆解自然与神性的比例。", desc: "艺术对你而言是精密科学。你试图用解剖刀和几何尺去测量灵魂的轮廓，在理性的巅峰处俯瞰感官世界。", logic: "利用‘渐隐法’模糊物质边界，将客观实证与神圣秩序通过数学比例完美咬合。", material: "胡桃木板、手稿、精密透视线。", resonance: "在算法时代，这种‘通才精神’是抵抗碎片化的最后尊严。", anxiety: "害怕知识的边界，追求全知却时刻受限于人类生理局限。", shadow: "过度理性导致的‘未完成’魔咒。", stats: [90, 100, 70, 50, 95], quote: "简单是终极的复杂。", books: ["《达·芬奇笔记》", "《哈默手稿》"] },
            VAN_GOGH: { name: "Van Gogh / 梵高", sub: "燃烧生命的表现主义者", identity: "你用旋转的笔触对抗内心的深渊。", desc: "你拒绝客观描摹，只服从情感洪流。你眼中的世界都在震颤，那是灵魂被高度挤压后的爆发。", logic: "以厚涂法赋予色彩物质重量感，通过色彩冲突制造近乎眩晕的视觉张力。", material: "厚重油彩、带有体温的笔触。", resonance: "在情感日益迟钝的社会，这种真诚具有击穿防御的野蛮力量。", anxiety: "害怕被放逐，对无法被理解的孤独持有生理性恐惧。", shadow: "由于追求精神极致带来的自我消耗。", stats: [98, 30, 85, 40, 95], quote: "我越是感到平凡，我就越是渴望创造。", books: ["《梵高传》", "《亲爱的提奥》"] },
            MONET: { name: "Monet / 莫奈", sub: "捕捉光线的瞬间猎手", identity: "你在变幻的光影中追逐永恒的残像。", desc: "物体本身不重要，重要的是光赋予它们的瞬间。你的一生都在捕捉那一抹转瞬即逝的空气感。", logic: "解构光谱，用细碎色块实现‘动态真实’。", material: "水汽、晨曦、吉维尼的花园。", resonance: "莫奈教我们如何真正去‘看’流动的生命。", anxiety: "对‘黑暗’的恐惧，害怕可见世界在视网膜中崩塌。", shadow: "有时陷入纯粹视觉愉悦，忽略了社会性追问。", stats: [65, 80, 95, 30, 85], quote: "我只想捕捉光投射在物体上的那一瞬间。", books: ["《莫奈：光的色彩》", "《吉维尼的花园》"] },
            PICASSO: { name: "Picasso / 毕加索", sub: "解构时空的维度魔术师", identity: "你通过破坏来建立新的宇宙法则。", desc: "你撕碎透视，将物体的多面按在同一个平面。你在审判传统的视觉逻辑，重建观察者主权。", logic: "多视角拼接，探讨图像作为‘概念’而非‘再现’的可能性。", material: "拼贴报纸、碎木片、攻击性几何线条。", resonance: "现代人的碎片化身份，正是立体主义在当代生存中的投射。", anxiety: "害怕停滞，恐惧被归类、被定义、被历史化。", shadow: "强大的征服欲给周围人带来的情感压迫。", stats: [92, 85, 60, 55, 98], quote: "每个孩子都是艺术家。", books: ["《毕加索的一生》", "《格尔尼卡》"] },
            DALI: { name: "Dalí / 达利", sub: "梦境边境的偏执狂", identity: "你用精密的写实去描绘疯狂的幻觉。", desc: "梦境才是真实的底色。现实不过是尚未融化的时钟。你在荒诞中寻找神性。", logic: "采用‘偏执狂临界状态法’，将潜意识符号进行具象化的奇观处理。", material: "融化钟表、蚂蚁、修长的象腿。", resonance: "在这个拟像包围的荒诞时代，达利的疯狂反而显得极度写实。", anxiety: "害怕平庸，试图通过制造视觉奇观来实现永恒。", shadow: "过度追求表演性与怪诞，掩盖了艺术本身的真诚探索。", stats: [95, 75, 40, 80, 85], quote: "我与疯子的唯一区别在于，我没疯。", books: ["《达利自传》", "《超现实主义宣言》"] },
            VERMEER: { name: "Vermeer / 弗美尔", sub: "光线与沉静的几何学家", identity: "你在极小的空间里构建永恒的宁静。", desc: "你迷恋窗外的微光。神性藏在那个倒牛奶的妇人或拉琴的少女指缝间。", logic: "利用暗箱般的精密构图，制造出一种近乎静止的时间美学。", material: "群青颜料、北欧窗光、黄杨木家具。", resonance: "在喧嚣时代，这种‘极致的缓慢’是对焦虑最温柔的抚慰。", anxiety: "害怕秩序崩塌，对私密空间被外界侵入持有天然警惕。", shadow: "过度追求细部而显得格局受限。", stats: [50, 95, 98, 40, 75], quote: "光是万物存在的理由。", books: ["《弗美尔的帽子》", "《带珍珠耳环的少女》"] },
            MATISSE: { name: "Matisse / 马蒂斯", sub: "色彩与节奏的生命主义者", identity: "你用剪刀和纯色治愈文明的疲惫。", desc: "你追求‘安乐椅’式的艺术. 你卸下沉重负担，用最纯粹的色块，赞美欢愉。", logic: "追求画面绝对平衡，构建心理疗愈场，消解感官挣扎。", material: "剪纸、原色油彩、圆润线条。", resonance: "内卷生活中，欢快的色彩是人类最后的避风港。", anxiety: "害怕痛苦的直接显现，试图在画面中掩盖一切挣扎痕迹。", shadow: "缺乏批判性力量，被视为某种装饰性的妥协。", stats: [40, 85, 90, 30, 95], quote: "我想要的是平衡、纯洁和宁静。", books: ["《马蒂斯：色彩奇迹》", "《剪纸艺术》"] },
            REMBRANDT: { name: "Rembrandt / 伦勃朗", sub: "暗影中的人性记录者", identity: "你在深沉的黑暗中寻找那一束拯救之光。", desc: "你是阴影的大师。你笔下的肖像见证个体生命在高光时刻的尊严。", logic: "利用明暗对比法，通过重色调压制背景凸显精神厚度。", material: "泥土气息、粗粝痕迹、戏剧性舞台光影。", resonance: "这种对‘平凡人神圣化’的处理，是任何时代对生命力的关怀。", anxiety: "害怕遗忘，试图在画布上存证自我作为‘人’的痕迹。", shadow: "过度自我沉溺，在众多的自画像中迷失。", stats: [85, 75, 55, 60, 92], quote: "没有光，就没有灵魂的深度。", books: ["《伦勃朗自传》", "《夜巡秘密》"] },
            CARAVAGGIO: { name: "Caravaggio / 卡拉瓦乔", sub: "神圣与世俗的野蛮冲撞者", identity: "你让神走下神坛，站在布满尘土的街道上。", desc: "你是暴徒，也是圣徒. 你用近乎残忍的真实，撕开了艺术虚伪的面纱。", logic: "极端的明暗对照带来的剧场感，迫使观者面对生存残留的真实感。", material: "侧切光、原始张力肉体、深红。", resonance: "在滤镜包装的伪物时代，卡拉瓦乔式的真实具有清醒力量。", anxiety: "害怕审判。对追捕与死亡有着深刻的生理预感。", shadow: "极端的侵略性使艺术充满了某种毁灭性暴力阴影。", stats: [98, 45, 30, 70, 95], quote: "我只画我看到的东西。", books: ["《卡拉瓦乔：生与死》", "《圣马太殉难》"] },
            MICHELANGELO: { name: "Michelangelo / 米开朗基罗", sub: "石中灵魂的释放者", identity: "你在坚硬的大理石中刺探人类意志的极限。", desc: "你鑿碎禁锢，释放灵魂。你是‘英雄主义悲歌’的谱写者，用痛苦释放美。", logic: "通过扭曲肌肉展现意志抗争的‘崇高感’，将人作为神性的载体。", material: "卡拉拉大理石、凿子。", resonance: "这种悲歌提醒我们在绝望中也要奋力挣扎。", anxiety: "害怕不完美。罪孽感极其沉重，由于过度用力而处于极度焦虑。", shadow: "过度追求极致带来的压迫感，使你成为了孤独者。", stats: [95, 60, 45, 80, 100], quote: "我在大理石中看见天使。", books: ["《米开朗基罗传》", "《创世纪》"] },
            KUSAMA: { name: "Yayoi Kusama / 草间弥生", sub: "无限增殖的消融者", identity: "你在重复的韵律中寻找宇宙的锚点。", desc: "你通过‘重复’寻求救赎. 消融自我，成为无限矩阵的一份子，对抗死亡恐惧。", logic: "以单一符号无限累积占领空间，实现从心理幻觉到现实的‘自我消融’。", material: "波点、反射镜面、软雕塑。", resonance: "个体被系统淹没的生存体验是现代人最深层的共鸣。", anxiety: "害怕自我边界被虚空吞噬，对‘不连续性’持有本能恐惧。", shadow: "过度执念可能导致现实感丧失，演变为自我封闭。", stats: [98, 40, 95, 30, 80], quote: "我的生命是在数百万个点中的一个。", books: ["《无限网》", "《我在这里》"] },
            HIRST: { name: "Damien Hirst / 达明安·赫斯特", sub: "死亡实验室的系统员", identity: "你试图用秩序和甲醛来对冲生命的不确定性。", desc: "你迷恋分类. 在冷冰冰的理性框架中审视生命的脆弱与科学的局限。", logic: "将死亡工业化静态固定，探讨信仰、科学与资本之间的权力博弈。", material: "福尔马林、药丸矩阵、蝴蝶。", resonance: "在生物技术时代，我们的生命是否正被某种隐形规则分类？", anxiety: "对‘肉体腐败’的本能恐惧. 通过极度控制来抵御失效。", shadow: "理性掩盖了情感贫瘠，使艺术沦为某种带有投机性质的游戏。", stats: [85, 95, 60, 75, 50], quote: "艺术是为了解释生命。", books: ["《为了上帝之爱》", "《难以置信的珍宝》"] },
            KAPOOR: { name: "Anish Kapoor / 安尼施·卡普尔", sub: "物质虚空的炼金术士", identity: "你在寻找能吞噬所有光线的纯粹深渊。", desc: "你追求极致知觉. 你是在物质世界中寻找‘非物质’缝隙的漫游者。", logic: "通过改变物体表面消除体积感，引导观者进入一种超验的觉知状态。", material: "Vantablack涂层、极深红颜料。", resonance: "在体验变轻的数字时代，你在试图夺回感官的生理重量。", anxiety: "对‘物质平庸化’的厌恶，通过极端的体量感来确证存在。", shadow: "追求极致体感可能导致作品脱离语境。", stats: [75, 65, 45, 98, 85], quote: "我一直被这种‘非物质’的力量吸引。", books: ["《利维坦》", "《非物质虚空》"] },
            RICHTER: { name: "Gerhard Richter / 格哈德·里希特", sub: "模糊现实的存档员", identity: "你在真实与虚构的重叠地带徘徊。", desc: "你警惕绝对真理. 解构历史与记忆的真相，拒绝任何固化的定义。", logic: "通过刮擦画面意识到‘不可见’的存在，探讨图像作为假象的本质。", material: "照片底图、金属刮刀、厚堆油彩。", resonance: "后真相时代，我们看到的‘真相’往往是被媒介处理过的残影。", anxiety: "对‘确定性’的怀疑，害怕艺术沦为某种煽动的工具。", shadow: "过度疏离可能让人觉得冷酷。", stats: [65, 90, 55, 75, 92], quote: "画画是为了让不可见的东西变得可见。", books: ["《阿特拉斯》", "《照片画集》"] },

                            setSelectedIdx(null);
                            setIsFadeEffect(false);
                            setIsTransitioning(false);
                            setStatusLog("");
                            window.scrollTo({ top: 0, behavior: 'auto' });
                        } else {
                            const sorted = Object.entries(newScores).sort((a,b) => b[1] - a[1]);
                            setResult(ARTISTS[sorted[0][0]] || ARTISTS.DA_VINCI);
                            setStep('result');
                            window.scrollTo({ top: 0, behavior: 'auto' });
                        }
                    }, 150); // 极速切换周期 150ms
                }, 50); 
            };

            const handleBack = () => {
                if (isTransitioning) return;
                if (history.length > 0) {
                    const lastState = history[history.length - 1];
                    setScores(lastState.scores);
                    setCurrentQ(lastState.currentQ);
                    setHistory(prev => prev.slice(0, -1));
                    setSelectedIdx(null);
                    setIsTransitioning(false);
                    window.scrollTo({ top: 0, behavior: 'auto' });
                } else { setStep('welcome'); }
            };

            useEffect(() => {
                if (step === 'result' && result && radarCanvas.current) {
                    if (chartRef.current) chartRef.current.destroy();
                    const ctx = radarCanvas.current.getContext('2d');
                    chartRef.current = new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['独创', '理性', '感官', '虚空', '意志'],
                            datasets: [{
                                data: result.stats,
                                backgroundColor: 'rgba(146, 129, 195, 0.1)',
                                borderColor: '#9281C3',
                                borderWidth: 2,
                                pointRadius: 0,
                            }]
                        },
                        options: {
                            scales: {
                                r: {
                                    angleLines: { color: 'rgba(0,0,0,0.05)' },
                                    grid: { color: 'rgba(0,0,0,0.05)' },
                                    ticks: { display: false },
                                    min: 0, max: 100,
                                    pointLabels: { font: { family: "'Noto Serif SC', serif", size: 10 }, color: '#5B4D8A' }
                                }
                            },
                            plugins: { legend: { display: false } }
                        }
                    });
                }
            }, [step, result]);

            const phaseTitle = QUESTIONS[currentQ].phase ? 
                QUESTIONS[currentQ].phase.replace('_', ' ') : 
                `Node ${currentQ + 1}`;

            return (
                <div className="min-h-screen relative flex flex-col overflow-x-hidden">
                    {step === 'welcome' && (
                        <div className="animate-fade-in flex-grow flex flex-col items-center justify-center min-h-screen relative overflow-hidden px-6">
                            <div className="absolute inset-0 z-0 pointer-events-none mask-center-void">
                                <svg width="100%" height="100%" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice">
                                    <path d="M-100,800 Q300,100 500,600 T1100,200" className="dotted-path" />
                                    <path d="M-50,400 Q400,900 1000,300" className="dotted-path" opacity="0.4" />
                                    {dots.map(dot => (
                                        <circle 
                                            key={dot.id} cx={dot.x} cy={dot.y} r={dot.size} 
                                            fill={dot.color} opacity={dot.opacity}
                                            className="floating-dot"
                                            style={{ animationDelay: `${dot.delay}s` }}
                                        />
                                    ))}
                                </svg>
                            </div>

                            <div className="relative z-10 flex flex-col items-center text-center space-y-12">
                                <div className="space-y-6">
                                    <div className="text-[9px] font-mono tracking-[0.8em] text-[#9281C3] uppercase opacity-80 mb-2">Experimental Soul Unit</div>
                                    <h1 className="text-6xl md:text-9xl font-bold tracking-tighter text-[#2D2A26] leading-none serif">
                                        艺术原型<br/>
                                        <span className="italic font-light text-gray-400 text-4xl md:text-7xl block mt-4">人格图谱测试</span>
                                    </h1>
                                    <div className="w-16 h-[1px] bg-[#9281C3]/40 mx-auto mt-8"></div>
                                    <p className="text-[14px] uppercase tracking-[0.4em] font-bold opacity-60 text-[#2D2A26] mt-4">
                                        寻找你精神底色里的艺术大师
                                    </p>
                                </div>
                                <div className="pt-6">
                                    <button onClick={() => setStep('quiz')} className="btn-start">
                                        启动扫描
                                    </button>
                                </div>
                                <p className="text-[11px] italic text-gray-400 leading-relaxed font-light tracking-[0.2em] max-w-sm mx-auto serif px-4">
                                    “艺术不仅仅是修辞，它是你在文明废墟上重建主体性的最后存证。”
                                </p>
                            </div>
                        </div>
                    )}

                    {step === 'quiz' && (
                        <div className="max-w-xl mx-auto flex flex-col justify-center min-h-[100vh] md:min-h-screen relative px-8 py-4">
                            <div className="absolute inset-0 z-0 pointer-events-none opacity-40">
                                <svg width="100%" height="100%" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice">
                                    {dots.map(dot => (
                                        <circle 
                                            key={dot.id} cx={dot.x} cy={dot.y} r={dot.size} 
                                            fill={dot.color} opacity={dot.opacity}
                                            className="floating-dot"
                                        />
                                    ))}
                                </svg>
                            </div>
                            
                            <div className={`q-wrapper flex flex-col justify-center w-full z-10 ${isFadeEffect ? 'q-fadeOut' : 'q-fadeIn'}`} key={currentQ}>
                                <div className="flex justify-between items-center border-b border-black/5 pb-3">
                                    <button onClick={handleBack} disabled={isTransitioning} className="text-[9px] uppercase opacity-40 hover:opacity-100 transition-all font-bold tracking-widest disabled:opacity-20 text-[#2D2A26]">BACK</button>
                                    <div className="flex items-center gap-2">
                                        <span className="text-[10px] font-mono text-gray-400 tracking-tighter uppercase">{phaseTitle}</span>
                                        <div className="h-[1px] w-6 bg-black/10"></div>
                                        <span className="text-[10px] font-mono text-[#9281C3]">30</span>
                                    </div>
                                </div>
                                
                                {statusLog && (
                                    <div className="absolute -top-12 left-0 status-log animate-pulse">
                                        SYSTEM_{statusLog}
                                    </div>
                                )}

                                <div className="space-y-2 flex flex-col items-center justify-center relative py-6 px-4">
                                    <h2 className="text-xl md:text-4xl font-medium leading-tight text-[#2D2A26] serif text-center">{QUESTIONS[currentQ].text}</h2>
                                    <p className="text-[8px] text-gray-400 italic tracking-[0.05em] opacity-40 uppercase mt-2">Observation Node - Subconscious Sample</p>
                                </div>

                                <div className="flex flex-col text-left space-y-0.5">
                                    {QUESTIONS[currentQ].options.map((opt, i) => (
                                        <button 
                                            key={`${currentQ}-${i}`} 
                                            onClick={(e) => handleAnswer(opt.type, i, e)} 
                                            disabled={isTransitioning}
                                            className={`option-btn group relative ${selectedIdx === i ? 'selected' : ''}`}
                                        >
                                            <div className="flex items-start">
                                                <span className={`text-[9px] md:text-[11px] mt-1 mr-5 md:mr-8 font-mono transition-colors ${selectedIdx === i ? 'text-[#9281C3]' : 'text-gray-300'}`}>0{i+1}</span>
                                                <span className={`text-[13px] md:text-[16px] leading-snug transition-colors ${selectedIdx === i ? 'text-black font-medium' : 'text-gray-700'}`}>{opt.text}</span>
                                            </div>
                                        </button>
                                    ))}
                                </div>

                                <div className="pt-10 flex justify-center opacity-30">
                                    <svg width="100" height="20" viewBox="0 0 100 20">
                                        <path d={`M 0 10 Q 25 ${10 - (currentQ/30)*10} 50 10 T 100 10`} className="spectrum-line" />
                                    </svg>
                                </div>
                            </div>
                        </div>
                    )}

                    {step === 'result' && result && (
                        <div className="max-w-4xl mx-auto animate-fade-in space-y-16 pb-32 relative px-8 py-20 flex-grow">
                            <div className="absolute top-0 left-0 w-full h-[1px] opacity-10 bg-[#9281C3]"></div>
                            <div className="text-center space-y-6 pt-10">
                                <div className="text-[9px] font-mono tracking-[0.5em] text-[#9281C3] uppercase border border-[#9281C3]/20 inline-block px-4 py-1">Diagnostic Profile Finalized</div>
                                <h2 className="text-6xl md:text-8xl font-bold tracking-tighter text-[#2D2A26] serif mt-4">{result.name}</h2>
                                <p className="text-sm text-gray-400 italic tracking-[0.5em] uppercase">{result.sub}</p>
                                <div className="text-[9px] font-mono text-gray-400 mt-2 uppercase tracking-widest">
                                    GENE_SEQ: {geneCode} / SYNC: 99.8%
                                </div>
                            </div>

                            <div className="bg-white/50 border border-black/5 relative grid md:grid-cols-2 gap-10 items-center p-10 sm:p-16 shadow-sm">
                                <div className="space-y-8 text-left">
                                    <div className="space-y-3">
                                        <h4 className="text-[12px] font-bold uppercase tracking-[0.4em] text-[#9281C3] flex items-center gap-3">
                                            精神底色报告 / ANALYSIS
                                        </h4>
                                        <p className="text-[17px] leading-relaxed text-gray-500 italic font-medium serif">“{result.identity}”</p>
                                    </div>
                                    <p className="text-[17px] leading-relaxed text-[#2D2A26] border-l-2 border-black/5 pl-6">{result.desc}</p>
                                </div>
                                <div className="aspect-square relative flex items-center justify-center p-6 border border-black/5 max-w-[220px] mx-auto w-full">
                                    <canvas ref={radarCanvas}></canvas>
                                </div>
                            </div>

                            <div className="space-y-20">
                                <section className="space-y-6 text-left">
                                    <div className="flex items-center justify-between border-b border-black/5 pb-3">
                                        <h3 className="text-[13px] font-bold uppercase tracking-[0.4em] text-gray-400">执念逻辑映射 / Logic Mapping</h3>
                                        <span className="text-[10px] font-mono text-[#9281C3]">02</span>
                                    </div>
                                    <div className="p-4 bg-white/30 border-l border-black/10 shadow-sm">
                                        <p className="text-[19px] leading-relaxed text-[#2D2A26] italic font-medium serif">{result.logic}</p>
                                    </div>
                                </section>

                                <section className="space-y-6 text-left">
                                    <div className="flex items-center justify-between border-b border-black/5 pb-3">
                                        <h3 className="text-[13px] font-bold uppercase tracking-[0.4em] text-gray-400">感官兼容性诊断 / Compatibility</h3>
                                        <span className="text-[10px] font-mono text-gray-300">03</span>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="p-4 bg-[#76C893]/10 border border-[#76C893]/20">
                                            <span className="text-[10px] font-bold uppercase block mb-2 text-[#76C893]">完美重合 / Synced</span>
                                            <p className="text-[10px] opacity-70">你的灵魂采样与 {result.name.split('/')[1]} 的深层结构重合度达 98.4%。</p>
                                        </div>
                                        <div className="p-4 bg-[#D62828]/10 border border-[#D62828]/20">
                                            <span className="text-[10px] font-bold uppercase block mb-2 text-[#D62828]">感知抵触 / Conflict</span>
                                            <p className="text-[10px] opacity-70">你对 卡特兰 的解构主义表达持天然警惕态度。</p>
                                        </div>
                                    </div>
                                </section>
                            </div>

                            <div className="p-20 bg-[#2D2A26] text-[#FDFBF7] text-center shadow-2xl relative overflow-hidden group rounded-sm">
                                <p className="text-3xl md:text-5xl leading-relaxed mb-8 italic font-light relative z-10 serif">
                                    <span className="relative z-10">“{result.quote}”</span>
                                </p>
                                <div className="text-[11px] text-[#9281C3] tracking-[1em] uppercase font-bold relative z-10">— 大师给你的最后真言 —</div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-px bg-black/5">
                                <div className="p-14 bg-[#FDFBF7]">
                                    <div className="text-[11px] font-bold mb-4 uppercase tracking-[0.4em] text-[#9281C3] font-sans">核心焦虑诊断 / ANXIETY</div>
                                    <div className="text-[16px] text-gray-600 leading-relaxed serif">{result.anxiety}</div>
                                </div>
                                <div className="p-14 bg-[#FDFBF7]">
                                    <div className="text-[11px] font-bold mb-4 uppercase tracking-[0.4em] text-gray-400 font-sans">系统阴影分析 / SHADOW</div>
                                    <div className="text-[15px] text-gray-700 leading-relaxed serif">{result.shadow}</div>
                                </div>
                            </div>

                            <div className="pt-24 flex flex-col gap-6 items-center">
                                <button onClick={() => window.location.reload()} className="px-14 py-7 border border-black/40 text-[12px] font-bold tracking-[0.7em] uppercase hover:bg-[#9281C3] hover:text-white transition-all shadow-xl active:scale-95">再次重塑原型 / RESTART</button>
                                <p className="text-[9px] text-center text-gray-400 tracking-[0.6em] uppercase opacity-60 font-mono">© 2026 Art Prototype Project by @Emergence_Lab</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
