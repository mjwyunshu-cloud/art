<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>艺术原型：人格图谱测试</title>
    
    <!-- 核心库引入 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@200;400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-start: #F4F2F7;
            --bg-end: #E4E0ED;
            --text-main: #3C3A4D; 
            --accent-purple: #9281C3; 
            --deep-purple: #5B4D8A;
            --dot-red: #D62828;
            --dot-blue: #2B3A67;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background: radial-gradient(circle at center, var(--bg-start) 0%, var(--bg-end) 100%);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
        }

        /* 极致颗粒感叠层 */
        .noise-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: multiply;
            opacity: 0.12;
            filter: url(#riso-grain);
            background-color: var(--accent-purple);
        }

        /* 纸张纹理 */
        .paper-texture {
            position: fixed;
            inset: 0;
            pointer-events: none;
            opacity: 0.04;
            z-index: 10;
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
        }

        .animate-fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Paradiso 风格：虚线流动 */
        .dotted-path {
            stroke-dasharray: 2 8;
            stroke-linecap: round;
            fill: none;
            stroke: var(--accent-purple);
            stroke-width: 0.6;
            opacity: 0.25;
            animation: dash-flow 80s linear infinite;
        }

        @keyframes dash-flow {
            to { stroke-dashoffset: -1000; }
        }

        /* 点阵随机流动 */
        .floating-dot {
            animation: float-random 25s ease-in-out infinite alternate;
        }

        @keyframes float-random {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, -40px); }
        }

        /* 选项按钮：压缩垂直空间，解决残留停留问题 */
        .option-btn {
            transition: all 0.3s ease;
            border-bottom: 1px solid rgba(146, 129, 195, 0.15);
            text-align: left;
            padding: 0.6rem 0; 
            width: 100%;
            outline: none;
            background: transparent;
        }

        @media (min-width: 768px) {
            .option-btn {
                padding: 1.1rem 0; 
            }
        }

        .option-btn:hover {
            background: rgba(146, 129, 195, 0.02);
            padding-left: 1rem;
        }

        .option-btn.selected {
            background-color: rgba(146, 129, 195, 0.15);
            border-bottom: 2px solid var(--accent-purple);
            padding-left: 1.2rem;
            transform: scale(0.99);
        }

        .btn-start {
            border: 1px solid var(--deep-purple);
            padding: 0.5rem 2.2rem;
            letter-spacing: 0.4em;
            font-size: 10px;
            font-weight: 700;
            transition: all 0.4s ease;
            background: rgba(255,255,255,0.4);
            color: var(--deep-purple);
            text-transform: uppercase;
            backdrop-filter: blur(10px);
        }

        .btn-start:hover {
            background: var(--deep-purple);
            color: white;
        }

        .serif { font-family: 'Noto Serif SC', serif; }
        .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }

    </style>
</head>
<body>
    <!-- Riso 颗粒感滤镜 -->
    <svg style="position: absolute; width: 0; height: 0;">
        <filter id="riso-grain">
            <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="4" stitchTiles="stitch" />
            <feColorMatrix type="matrix" values="0 0 0 0 0.4 0 0 0 0 0.3 0 0 0 0 0.6 0 0 0 0 0.3 0" />
        </filter>
    </svg>

    <div class="paper-texture"></div>
    <div class="noise-overlay"></div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        const ARTISTS = {
            DA_VINCI: { name: "Da Vinci / 达·芬奇", sub: "全知全能的理性圣徒", identity: "你在严密的观察中拆解自然与神性的比例。", desc: "艺术对你而言是精密科学。你试图用解剖刀和几何尺去测量灵魂的轮廓，在理性的巅峰处俯瞰感官世界。", logic: "利用‘渐隐法’模糊物质边界，将客观实证与神圣秩序通过数学比例完美咬合。", material: "胡桃木板、手绘稿。你迷恋能够被公式量化的生理结构。", resonance: "在算法统治的当代，这种‘通才渴望’是抵抗信息碎片化的最后尊严。", anxiety: "核心焦虑：害怕知识的边界，追求全知却时刻受限于人类生理感官的局限。", shadow: "系统阴影：过度逻辑导致情感冷缩，陷入‘未完成’的强迫症循环。", stats: [90, 100, 70, 50, 95], quote: "简单是终极的复杂。", books: ["《达·芬奇笔记》", "《哈默手稿》"] },
            VAN_GOGH: { name: "Van Gogh / 梵高", sub: "燃烧生命的表现主义者", identity: "你用旋转的笔触对抗内心的深渊。", desc: "你拒绝客观描摹，只服从情感洪流。你眼中的世界都在震颤，那是灵魂被高度挤压后的爆发。", logic: "以厚涂法赋予色彩物质重量感，通过色彩冲突制造近乎眩晕的视觉张力。", material: "厚重油彩、带有体温的笔触。你认为颜料本身就是流动的血液。", resonance: "在标准化的工业社会，这种‘自焚式’的真诚具有击穿防御的野蛮力量。", anxiety: "被世界遗弃的恐惧，对无法实现‘真实连接’的孤独持有生理性剧痛。", shadow: "过度敏锐导致精神过载，容易陷入毁灭性的自我消耗。", stats: [98, 30, 85, 40, 95], quote: "我越是感到平凡，我就越是渴望创造。", books: ["《梵高传》", "《亲爱的提奥》"] },
            MONET: { name: "Monet / 莫奈", sub: "捕捉光线的瞬间猎手", identity: "你在变幻的光影中追逐永恒的残像。", desc: "物体本身不重要，重要的是光赋予它们的瞬间。你的一生都在捕捉那一抹转瞬即逝的空气感。", logic: "解构光谱，用细碎色块取代线条，实现由大脑合成的‘动态真实’。", material: "写生、波光质感。你迷恋水汽与光线交织出的那种朦胧的‘瞬间性’。", resonance: "莫奈教我们如何真正去‘看’——去看流动的生命，而非固化的身份标签。", anxiety: "对‘黑暗’的恐惧，害怕可见世界的秩序在视网膜中崩塌。", shadow: "有时陷入纯粹的视觉愉悦，忽略了深层的社会性追问。", stats: [65, 80, 95, 30, 85], quote: "我只想捕捉光投射在物体上的那一瞬间。", books: ["《莫奈：光的色彩》", "《吉维尼的花园》"] },
            PICASSO: { name: "Picasso / 毕加索", sub: "解构时空的维度魔术师", identity: "你通过破坏来建立新的宇宙法则。", desc: "你撕碎透视，将物体的多面按在同一个平面。你在审判传统的视觉逻辑，重建观察者主权。", logic: "多视角拼接，打破单一时空维度，探讨图像作为‘概念’而非‘再现’的可能性。", material: "拼贴、几何化线条。你认为破坏就是创造的起点。", resonance: "现代人的多线程生活与碎片化身份，正是立体主义在当代生存状态中的投射。", anxiety: "害怕平庸带来的‘停滞’，恐惧被归类、被定义、被历史化。", shadow: "强大的征服欲与多变人格，往往给周围人带来情感压迫。", stats: [92, 85, 60, 55, 98], quote: "每个孩子都是艺术家。", books: ["《毕加索的一生》", "《格尔尼卡》"] },
            DALI: { name: "Dalí / 达利", sub: "梦境边境的偏执狂", identity: "你用精密的写实去描绘疯狂的幻觉。", desc: "梦境才是真实的底色。现实不过是尚未融化的时钟。你在荒诞中寻找神性。", logic: "将潜意识符号进行极度具象化的奇观处理，模糊虚实界限。", material: "融化的时钟、蚂蚁。你迷恋那种具有‘超现实’质感的细节。", resonance: "在这个被拟像包围的荒诞时代，达利的疯狂呈现出某种极致的写实感。", anxiety: "害怕被平庸吞噬，试图通过制造视觉奇观来实现永恒。", shadow: "过度追求表演性与怪诞，有时会掩盖艺术本身的真诚探索。", stats: [95, 75, 40, 80, 85], quote: "我与疯子的唯一区别在于，我没疯。", books: ["《达利自传》", "《超现实主义宣言》"] },
            VERMEER: { name: "Vermeer / 弗美尔", sub: "光线与沉静的几何学家", identity: "你在极小的空间里构建永恒的宁静。", desc: "你迷恋窗外的微光。神性不在远方，就藏在那个倒牛奶的妇人指缝间。", logic: "利用暗箱般的精密构图与光斑叠加，制造出一种近乎静止的时间美学。", material: "北欧窗光、黄杨木。你追求极致的、带有神圣感的室内寂静。", resonance: "在喧嚣时代，这种‘极致的缓慢’是对现代焦虑最温柔的抚慰。", anxiety: "害怕秩序崩塌，对私密空间被外界侵入持有防御本能。", shadow: "格局受限，有时陷入一种带有窒息感的静态封闭。", stats: [50, 95, 98, 40, 75], quote: "光是万物存在的理由。", books: ["《弗美尔的帽子》", "《带珍珠耳环的少女》"] },
            MATISSE: { name: "Matisse / 马蒂斯", sub: "色彩与节奏的生命主义者", identity: "你用剪刀和纯色治愈文明的疲惫。", desc: "你追求‘安乐椅’式的艺术. 你卸下沉重负担，用最纯粹的色块，赞美欢愉。", logic: "色彩极致简化，追求画面绝对平衡，构建心理疗愈场，消解挣扎。", material: "彩色剪纸、原色. 你认为艺术应该是对精神的一种纯净按摩。", resonance: "内卷生活中，欢快的色彩是人类最后的避风港。", anxiety: "害怕痛苦的直接显现，试图在画面中掩盖一切挣扎生命痕迹。", shadow: "缺乏批判性力量，有时被视为某种对现实痛苦的装饰性妥协。", stats: [40, 85, 90, 30, 95], quote: "我想要的是平衡、纯洁和宁静。", books: ["《马蒂斯：色彩奇迹》", "《剪纸艺术》"] },
            REMBRANDT: { name: "Rembrandt / 伦勃朗", sub: "暗影中的人性记录者", identity: "你在深沉的黑暗中寻找那一束拯救之光。", desc: "你是阴影的大师。你笔下的肖像见证个体尊严，在黑暗褶皱中寻找灵魂。", logic: "利用‘明暗对比法’压制背景，凸显主体人物的精神厚度与历史感。", material: "粗粝痕迹、戏剧性舞台光影。你迷恋具有厚度的岁月质感。", resonance: "这种对‘平凡人神圣化’的处理，是任何时代对生命力的关怀。", anxiety: "害怕遗忘与精神破产，试图在画布上存证自我的存在痕迹。", shadow: "过度自我沉溺，在众多的自画像中迷失于苍凉境遇。", stats: [85, 75, 55, 60, 92], quote: "没有光，就没有灵魂的深度。", books: ["《伦勃朗自传》", "《夜巡秘密》"] },
            CARAVAGGIO: { name: "Caravaggio / 卡拉瓦乔", sub: "神圣与世俗的野蛮冲撞者", identity: "你让神走下神坛，站在布满尘土的街道上。", desc: "你是暴徒，也是圣徒. 你用近乎残忍的真实，呈现肉体最原始的张力。", logic: "极端的明暗对照带来的剧场感，迫使观者面对生存的残酷性。", material: "侧切聚光灯。你认为真理就藏在那些肮脏且真实的细节里。", resonance: "在滤镜包装的伪物时代，卡拉瓦乔式的真实具有清醒的野蛮力量。", anxiety: "害怕审判。对追捕与死亡有着深刻的生理预感。", shadow: "极端的侵略性与不稳定性，使艺术充满了某种毁灭性暴力阴影。", stats: [98, 45, 30, 70, 95], quote: "我只画我看到的东西。", books: ["《卡拉瓦乔：生与死》", "《圣马太殉难》"] },
            MICHELANGELO: { name: "Michelangelo / 米开朗基罗", sub: "石中灵魂的释放者", identity: "你在坚硬的大理石中刺探人类意志的极限。", desc: "你凿碎禁锢，释放灵魂。你是‘英雄主义悲歌’的谱写者，用痛苦释放美。", logic: "通过扭曲肌肉展现意志抗争的‘崇高感’，将人作为神性的载体。", material: "卡拉拉大理石、凿子. 你迷恋那种处于张力极限的形态。", resonance: "这种英雄主义悲歌提醒我们在绝望中也要奋力挣扎。", anxiety: "害怕不完美。由于过度用力而处于极度焦虑。", shadow: "过度追求极致带来的压迫感，使你成为了一个伟大的孤独者。", stats: [95, 60, 45, 80, 100], quote: "我在大理石中看见天使。", books: ["《米开朗基罗传》", "《创世纪》"] },
            KUSAMA: { name: "Yayoi Kusama / 草间弥生", sub: "无限增殖的消融者", identity: "你在重复的韵律中寻找宇宙的锚点。", desc: "你通过‘重复’寻求救赎. 消融自我，成为无限矩阵的一份子，对抗恐惧。", logic: "以单一符号无限累积占领空间，实现从心理幻觉到现实的‘自我消融’。", material: "波点、反射镜面. 你认为单一圆点是连接宇宙的最小单位。", resonance: "个体被系统淹没的生存体验是现代人最深层的共鸣。", anxiety: "害怕自我边界被虚空吞噬，对‘不连续性’持有本能恐惧。", shadow: "过度执念可能导致现实感丧失，演变为病理性的自我封闭。", stats: [98, 40, 95, 30, 80], quote: "我的生命是在数百万个点中的一个。", books: ["《无限网》", "《我在这里》"] },
            HIRST: { name: "Damien Hirst / 达明安·赫斯特", sub: "死亡实验室的系统员", identity: "你试图用秩序和甲醛来对冲生命的不确定性。", desc: "你迷恋分类. 在冷冰冰的理性框架中审视生命的脆弱与科学的局限。", logic: "将死亡工业化静态固定，探讨信仰、科学与资本之间的权力博弈。", material: "福尔马林、药丸矩阵. 你迷恋那种剥离情感的、冷酷的秩序感。", resonance: "在生物技术时代，我们的生命是否正被某种隐形规则分类？", anxiety: "对‘肉体腐败’的本能恐惧. 通过极度控制来抵御生命的失效。", shadow: "理性掩盖了情感贫瘠，使艺术沦为某种带有投机性质的游戏。", stats: [85, 95, 60, 75, 50], quote: "艺术是为了解释生命。", books: ["《为了上帝之爱》", "《难以置信的珍宝》"] },
            KAPOOR: { name: "Anish Kapoor / 安尼施·卡普尔", sub: "物质虚空的炼金术士", identity: "你在寻找能吞噬所有光线的纯粹深渊。", desc: "你追求极致知觉. 你是在物质世界中寻找‘非物质’缝隙的漫游者。", logic: "通过改变物体表面消除体积感，引导观者进入一种超验的觉知状态。", material: "Vantablack涂层、极深红颜料. 你追求刺痛视网膜的纯粹度。", resonance: "在体验变轻的数字时代，你在试图夺回感官的生理重量。", anxiety: "对‘物质平庸化’的厌恶，通过极端的体量感来确证存在。", shadow: "追求极致体感可能导致作品脱离语境，成为纯粹的感官神话。", stats: [75, 65, 45, 98, 85], quote: "我一直被这种‘非物质’的力量吸引。", books: ["《利维坦》", "《非物质虚空》"] },
            RICHTER: { name: "Gerhard Richter / 格哈德·里希特", sub: "模糊现实的存档员", identity: "你在真实与虚构的重叠地带徘徊。", desc: "你警惕绝对真理. 解构历史与记忆的真相，拒绝任何固化的定义。", logic: "通过刮擦画面意识到‘不可见’的存在，探讨图像作为假象的本质。", material: "模糊的照片底图、金属刮刀. 你拒绝被任何风格所固定。", resonance: "后真相时代，我们看到的‘真相’往往是被媒介处理过的残影。", anxiety: "对‘确定性’的怀疑，害怕艺术沦为某种煽动的工具。", shadow: "过度疏离可能让人觉得冷酷，陷入一种虚无主义的循环。", stats: [65, 90, 55, 75, 92], quote: "画画是为了让不可见的东西变得可见。", books: ["《阿特拉斯》", "《照片画集》"] },
            ABRAMOVIC: { name: "Marina Abramovic / 玛丽娜·阿布拉莫维奇", sub: "身体边界测试者", identity: "你用极端的意志去刺探人类情感的底线。", desc: "将肉身作为媒介，在极端的痛苦或沉默中寻找意识的升华与洗涤。", logic: "通过长时间重复行为打破表演者与观者的界限，实现精神转化。", material: "瞳孔、时间与绝对的沉默. 你认为时间是艺术最核心的物质。", resonance: "在缺乏连接的社交时代，生理性的‘凝视’具有巨大冲击力。", anxiety: "对‘虚假’的强烈不适，始终在刺破隔离痛苦的保护壳。", shadow: "表演性受难有时滑向自我的神圣化，显得过于自恋。", stats: [95, 50, 40, 85, 98], quote: "艺术家必须是一面镜子。", books: ["《穿墙而过》", "《节奏系列》"] },

            BOURGEOIS: { name: "Louise Bourgeois / 路易丝·布尔乔亚", sub: "记忆创伤缝纫师", identity: "你通过巨大的蜘蛛和密室来治愈童年伤痕。", desc: "寻找情感对应物的人. 那些蜘蛛其实都是你在缝合破碎的记忆。", logic: "将私密禁忌经验转化为压迫感装置，实现视觉上的心理分析。", material: "大理石、缝衣针. 你认为艺术就是理智的保证。", resonance: "在焦虑横行的时代，你展示了如何与原生家庭的‘蜘蛛’共处。", anxiety: "对‘遗弃’的恐惧，对安全性持有近乎偏执的索求。", shadow: "过度沉溺过去可能阻碍自我的向前，使艺术变成无止尽宣泄。", stats: [95, 60, 85, 75, 80], quote: "艺术是理智的保证。", books: ["《蜘蛛》", "《破坏性父亲》"] },
            ELIASON: { name: "Olafur Eliasson / 奥拉维尔·埃利亚松", sub: "生态气象实验室", identity: "你在展厅里制造太阳，唤醒人类对自然的共感。", desc: "参与. 将雾气和彩虹带进美术馆，让人重新感受自然界原始的流动。", logic: "模拟庞大自然现象，迫使观者重新审视人与自然的脆弱共生关系。", material: "钠光灯、真正的冰川碎块. 利用科技复归最原始的触觉。", resonance: "全球变暖不再是枯燥数据，而是生理性的‘警示艺术’。", anxiety: "对‘生态坍塌’的危机感，害怕丧失对自然界的情感能力。", shadow: "高度技术依赖掩盖审美逻辑，被误解为高级科技娱乐。", stats: [75, 90, 50, 85, 85], quote: "艺术是世界的一面透镜。", books: ["《天气计划》", "《现实中介》"] },

                { text: "一座藏在地底、通过极简切片观察星空的火山口", type: "TURRELL" }, { text: "一间摆满了自己童年旧物与破碎娃娃的阁楼", type: "BOURGEOIS" }, { text: "一处一望无际、唯有海平线与静止时间的岛屿", type: "SUGIMOTO" }, { text: "一个闪亮得如同镜面宫殿、映射出千万个自我的展厅", type: "DA_VINCI" }
            ]},
            { id: 23, text: "关于“时间”，你的物质感触更像是：", source: "时间物质化研究", options: [
                { text: "永恒的凝固，是耗费一生心力去捕获的那抹静谧", type: "SUGIMOTO" }, { text: "流动的幻境，是梦境、现实与过去重叠的过程", type: "DALI" }, { text: "增殖的循环，是波点在空间中不断律动的重复感", type: "KUSAMA" }, { text: "光影的赛跑，是每一秒钟色彩都在变幻的空气残片", type: "MONET" }
            ]},
            { id: 24, text: "当你听到一段从未听过的旋律，你会联想到：", source: "联觉艺术研究", options: [
                { text: "旋律中蕴含的严密数学逻辑与几何升降格律", type: "DA_VINCI" }, { text: "大团强烈色彩在黑暗画布上不断爆裂的视觉幻象", type: "VAN_GOGH" }, { text: "不断重复、旋转且永无止境的宇宙电讯频率", type: "KUSAMA" }, { text: "一种支离破碎、不断被切碎又重组的采样噪音", type: "PICASSO" }
            ]},
            { id: 25, text: "你对“触感”的偏好更像是：", source: "艺术物质性偏好", options: [
                { text: "卡拉拉大理石冰冷、坚硬且带有神性的细腻感", type: "MICHELANGELO" }, { text: "经过长年腐蚀后，铅块表面那种粗糙而沉重的金属感", type: "DA_VINCI" }, { text: "湿润相纸在显影液中慢慢浮现出的那种朦胧感", type: "SUGIMOTO" }, { text: "纯洁、平整且富有张力的工业乳胶充气表面", type: "HIRST" }
            ]},
            { id: 26, text: "关于“永恒”，你的理解更接近：", source: "时间哲学命题", options: [
                { text: "在极长的时间曝光中，万物消解后留下的那抹空无", type: "SUGIMOTO" }, { text: "通过不断重复自我的符号，直到符号战胜了死亡", type: "KUSAMA" }, { text: "被绝对真空包裹的标本，永远维持在最鲜活的此刻", type: "HIRST" }, { text: "在大理石中被凿出的英雄意志，穿越千年的精神回响", type: "MICHELANGELO" }
            ]},
            { id: 27, text: "你如何看待“失败”？", source: "韧性原型测试", options: [
                { text: "失败不过是由于解剖比例出了一点小偏差", type: "DA_VINCI" }, { text: "失败是必须去吞咽的、令人发狂的精神磨灭", type: "VAN_GOGH" }, { text: "失败是某种被层层涂抹后、反而呈现出深度的画作", type: "RICHTER" }, { text: "失败是一个绝妙的嘲讽素材，可以转换成行为艺术", type: "CATTELAN" }
            ]},
            { id: 28, text: "你最希望自己在历史中被如何记住？", source: "身份认知测试", options: [
                { text: "一个全能天才，用理性的光辉照亮了黑暗世纪", type: "DA_VINCI" }, { text: "一个匿名、消失在历史深处，只留下影子的幽灵", type: "RICHTER" }, { text: "一个在画布前燃尽生命、用色彩呼喊灵魂的人", type: "VAN_GOGH" }, { text: "一个能够分裂、在每个时代变换面孔的千面者", type: "PICASSO" }
            ]},
            { id: 29, text: "如果你看到有人在神圣的殿堂里大笑，你会：", source: "权威挑战测试", options: [
                { text: "静静观察大笑时人脸部的肌肉走向与结构变化", type: "DA_VINCI" }, { text: "觉得这大笑声形成了一种支离破碎的几何空间断裂", type: "PICASSO" }, { text: "被这种挑战权威的荒诞感所吸引，想和他一起大笑", type: "CATTELAN" }, { text: "觉得这笑声里一定藏着对这个荒唐世界的深层焦虑", type: "VAN_GOGH" }
            ]},
            { id: 30, text: "最后，如果你一生的原型凝练成了一件圣器，它会是：", source: "终焉逻辑探讨", options: [
                { text: "一把剖开伪善现实的、带有血色张力的达利式软刀", type: "DALI" }, { text: "一卷记录了文明起源、永远折叠不完的深海地图", type: "SUGIMOTO" }, { text: "一个装满了晚霞与浓雾、极其静谧的人造呼吸瓶", type: "ELIASON" }, { text: "一个空无一物但外壳极其闪亮、带有红色标注的礼盒", type: "CATTELAN" }
            ]}
        ];

        function App() {
            const [step, setStep] = useState('welcome');
            const [currentQ, setCurrentQ] = useState(0);
            const [scores, setScores] = useState({});
            const [history, setHistory] = useState([]);
            const [result, setResult] = useState(null);
            const [selectedIdx, setSelectedIdx] = useState(null);
            const [isTransitioning, setIsTransitioning] = useState(false);

            const radarCanvas = useRef(null);
            const chartRef = useRef(null);

            // 生成放射状且不均匀分布的随机点阵
            const dots = useMemo(() => {
                return [...Array(140)].map((_, i) => {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 50 + Math.pow(Math.random(), 0.7) * 700; // 形成非均匀分布，中心密度大
                    return {
                        x: 500 + Math.cos(angle) * dist,
                        y: 500 + Math.sin(angle) * dist,
                        size: 0.8 + Math.random() * 4.5,
                        opacity: 0.15 + Math.random() * 0.45,
                        color: Math.random() > 0.85 ? 'var(--dot-red)' : 'var(--accent-purple)',
                        delay: Math.random() * 12
                    };
                });
            }, []);

            const handleAnswer = (type, index) => {
                if (isTransitioning) return;
                
                // 立即更新选中状态
                setSelectedIdx(index);
                setIsTransitioning(true);
                
                const currentHistory = { scores, currentQ };
                const newScores = { ...scores, [type]: (scores[type] || 0) + 1 };
                
                setTimeout(() => {
                    setHistory(prev => [...prev, currentHistory]);
                    setScores(newScores);
                    
                    if (currentQ < QUESTIONS.length - 1) {
                        setCurrentQ(prev => prev + 1);
                        // 重要：强制重置下一题的选中索引，防止残留
                        setSelectedIdx(null);
                        setIsTransitioning(false);
                        window.scrollTo({ top: 0, behavior: 'auto' });
                    } else {
                        const sorted = Object.entries(newScores).sort((a,b) => b[1] - a[1]);
                        const winner = ARTISTS[sorted[0][0]] || ARTISTS.DA_VINCI;
                        setResult(winner);
                        setStep('result');
                        window.scrollTo({ top: 0, behavior: 'auto' });
                    }
                }, 180); 
            };

            const handleBack = () => {
                if (isTransitioning) return;
                if (history.length > 0) {
                    const lastState = history[history.length - 1];
                    setScores(lastState.scores);
                    setCurrentQ(lastState.currentQ);
                    setHistory(prev => prev.slice(0, -1));
                    setSelectedIdx(null);
                    setIsTransitioning(false);
                    window.scrollTo({ top: 0, behavior: 'auto' });
                } else {
                    setStep('welcome');
                }
            };

            useEffect(() => {
                if (step === 'result' && result && radarCanvas.current) {
                    if (chartRef.current) chartRef.current.destroy();
                    const ctx = radarCanvas.current.getContext('2d');
                    chartRef.current = new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['独创', '理性', '感官', '虚空', '意志'],
                            datasets: [{
                                data: result.stats,
                                backgroundColor: 'rgba(146, 129, 195, 0.1)',
                                borderColor: '#9281C3',
                                borderWidth: 1.5,
                                pointRadius: 0,
                            }]
                        },
                        options: {
                            scales: {
                                r: {
                                    angleLines: { color: 'rgba(0,0,0,0.05)' },
                                    grid: { color: 'rgba(0,0,0,0.05)' },
                                    ticks: { display: false },
                                    min: 0, max: 100,
                                    pointLabels: { font: { family: "'Noto Serif SC', serif", size: 10 }, color: '#5B4D8A' }
                                }
                            },
                            plugins: { legend: { display: false } }
                        }
                    });
                }
            }, [step, result]);

            return (
                <div className="min-h-screen relative flex flex-col overflow-x-hidden">
                    {step === 'welcome' && (
                        <div className="animate-fade-in flex-grow flex flex-col items-center justify-center min-h-screen relative overflow-hidden px-6">
                            {/* 背景：不均匀放射点阵 + Paradiso 虚线路径 */}
                            <div className="absolute inset-0 z-0 pointer-events-none">
                                <svg width="100%" height="100%" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid slice">
                                    <defs>
                                        <radialGradient id="purple-glow" cx="50%" cy="50%" r="50%">
                                            <stop offset="0%" stopColor="white" stopOpacity="0.4" />
                                            <stop offset="100%" stopColor="transparent" />
                                        </radialGradient>
                                    </defs>
                                    
                                    {/* Paradiso 虚线系统 */}
                                    <path d="M-100,800 Q300,100 500,600 T1100,200" className="dotted-path" />
                                    <path d="M-50,400 Q400,900 1000,300" className="dotted-path" opacity="0.4" />
                                    <circle cx="850" cy="150" r="160" className="dotted-path" opacity="0.3" />

                                    {/* 11.34.27 风格：放射状不均匀流动点阵 */}
                                    {dots.map((dot, i) => (
                                        <circle 
                                            key={i} 
                                            cx={dot.x} cy={dot.y} r={dot.size} 
                                            fill={dot.color} 
                                            opacity={dot.opacity}
                                            className="floating-dot"
                                            style={{ animationDelay: `${dot.delay}s` }}
                                        />
                                    ))}

                                    <circle cx="500" cy="500" r="350" fill="url(#purple-glow)" opacity="0.5" />
                                </svg>
                            </div>

                            {/* 核心文字区块：极致居中 */}
                            <div className="relative z-10 flex flex-col items-center text-center space-y-12">
                                <div className="space-y-6">
                                    <div className="text-[9px] font-mono tracking-[0.8em] text-[#9281C3] uppercase opacity-80 mb-2">Artistic Profiling System</div>
                                    <h1 className="text-6xl md:text-9xl font-bold tracking-tighter text-[#2D2A26] leading-none serif">
                                        艺术原型<br/>
                                        <span className="italic font-light text-gray-400 text-4xl md:text-7xl block mt-4">人格图谱测试</span>
                                    </h1>
                                    <div className="w-16 h-[1px] bg-[#9281C3]/40 mx-auto mt-8"></div>
                                    <p className="text-[14px] uppercase tracking-[0.4em] font-bold opacity-60 text-[#2D2A26] mt-4">
                                        寻找你精神底色里的艺术大师
                                    </p>
                                </div>
                                
                                <div className="pt-6">
                                    <button onClick={() => setStep('quiz')} className="btn-start">
                                        启动扫描
                                    </button>
                                </div>

                                <p className="text-[11px] italic text-gray-400 leading-relaxed font-light tracking-[0.2em] max-w-sm mx-auto serif">
                                    “艺术不仅仅是修辞，它是你在文明废墟上重建主体性的最后存证。”
                                </p>
                            </div>

                            {/* 精致的底部边注 */}
                            <div className="absolute bottom-6 right-8 flex items-center gap-3 opacity-30 text-[7px] font-mono tracking-widest uppercase">
                                <span>34.69°N / 135.50°E</span>
                                <div className="w-0.5 h-0.5 bg-[#9281C3] rounded-full"></div>
                                <span>PURPLE STUDY</span>
                            </div>
                        </div>
                    )}

                    {step === 'quiz' && (
                        <div 
                            className="max-w-xl mx-auto animate-fade-in flex flex-col justify-center min-h-[100vh] md:min-h-screen relative px-8 py-4" 
                            key={currentQ} /* 使用当前题号作为 key，强制 DOM 分支重置 */
                        >
                            <div className="flex justify-between items-center border-b border-black/5 pb-3">
                                <button onClick={handleBack} disabled={isTransitioning} className="text-[9px] uppercase opacity-40 hover:opacity-100 transition-all font-bold tracking-widest disabled:opacity-20 text-[#2D2A26]">BACK</button>
                                <div className="flex items-center gap-2">
                                    <span className="text-[10px] font-mono text-gray-400 tracking-tighter">NODE_{String(currentQ + 1).padStart(2, '0')}</span>
                                    <div className="h-[1px] w-6 bg-black/10"></div>
                                    <span className="text-[10px] font-mono text-[#9281C3]">30</span>
                                </div>
                            </div>
                            
                            {/* 题目内容：极致压缩垂直空间，解决手机下滑问题 */}
                            <div className="space-y-3 flex flex-col items-center justify-center relative py-6 px-4">
                                <h2 className="text-xl md:text-4xl font-medium leading-tight text-[#2D2A26] serif text-center">{QUESTIONS[currentQ].text}</h2>
                                <p className="text-[8px] text-gray-400 italic tracking-[0.05em] uppercase">— {QUESTIONS[currentQ].source} —</p>
                            </div>

                            <div className="flex flex-col text-left space-y-0.5">
                                {QUESTIONS[currentQ].options.map((opt, i) => (
                                    <button 
                                        key={`${currentQ}-${i}`} 
                                        onClick={() => handleAnswer(opt.type, i)} 
                                        className={`option-btn group relative ${selectedIdx === i ? 'selected' : ''}`}
                                    >
                                        <div className="flex items-start">
                                            <span className={`text-[9px] md:text-[11px] mt-1 mr-5 md:mr-8 font-mono transition-colors ${selectedIdx === i ? 'text-[#9281C3]' : 'text-gray-300'}`}>0{i+1}</span>
                                            <span className={`text-[13px] md:text-[16px] leading-snug transition-colors ${selectedIdx === i ? 'text-black font-medium' : 'text-gray-700'}`}>{opt.text}</span>
                                        </div>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}

                    {step === 'result' && result && (
                        <div className="max-w-4xl mx-auto animate-fade-in space-y-16 pb-32 relative px-8 py-20 flex-grow">
                            <div className="absolute top-0 left-0 w-full h-[1px] opacity-10 bg-[#9281C3]"></div>
                            
                            <div className="text-center space-y-6 pt-10">
                                <div className="text-[9px] font-mono tracking-[0.5em] text-[#9281C3] uppercase border border-[#9281C3]/20 inline-block px-4 py-1">Diagnostic Profile Complete</div>
                                <h2 className="text-5xl md:text-8xl font-bold tracking-tighter text-[#2D2A26] serif mt-4">{result.name}</h2>
                                <p className="text-sm text-gray-400 italic tracking-[0.5em] uppercase">{result.sub}</p>
                            </div>

                            <div className="bg-white/50 border border-black/5 relative grid md:grid-cols-2 gap-10 items-center p-10 sm:p-16 shadow-sm">
                                <div className="space-y-8 text-left">
                                    <div className="space-y-3">
                                        <h4 className="text-[12px] font-bold uppercase tracking-[0.4em] text-[#9281C3] flex items-center gap-3 font-sans">
                                            精神底色报告 / REPORT
                                        </h4>
                                        <p className="text-[17px] leading-relaxed text-gray-500 italic font-medium serif">“{result.identity}”</p>
                                    </div>
                                    <p className="text-[17px] leading-relaxed text-[#2D2A26] border-l-2 border-black/5 pl-6">{result.desc}</p>
                                </div>
                                <div className="aspect-square relative flex items-center justify-center p-6 border border-black/5 max-w-[220px] mx-auto w-full">
                                    <canvas ref={radarCanvas}></canvas>
                                </div>
                            </div>

                            <div className="space-y-20">
                                <section className="space-y-6 text-left">
                                    <div className="flex items-center justify-between border-b border-black/5 pb-3">
                                        <h3 className="text-[13px] font-bold uppercase tracking-[0.4em] text-gray-400">执念逻辑 / Artistic Logic Mapping</h3>
                                        <span className="text-[10px] font-mono text-[#9281C3]">02</span>
                                    </div>
                                    <div className="p-4 bg-white/30 border-l border-black/10">
                                        <p className="text-[19px] leading-relaxed text-[#2D2A26] italic font-medium serif">{result.logic}</p>
                                    </div>
                                </section>

                                <section className="space-y-6 text-left">
                                    <div className="flex items-center justify-between border-b border-black/5 pb-3">
                                        <h3 className="text-[13px] font-bold uppercase tracking-[0.4em] text-gray-400">物质与技法 / Materiality & Field</h3>
                                        <span className="text-[10px] font-mono text-gray-300">03</span>
                                    </div>
                                    <div className="p-4">
                                        <p className="text-[18px] leading-relaxed text-[#2D2A26] opacity-80 serif">{result.material}</p>
                                    </div>
                                </section>

                                <section className="space-y-6 text-left">
                                    <div className="flex items-center justify-between border-b border-black/5 pb-3">
                                        <h3 className="text-[13px] font-bold uppercase tracking-[0.4em] text-gray-400">时代共振 / Societal Resonance</h3>
                                        <span className="text-[10px] font-mono text-gray-300">04</span>
                                    </div>
                                    <div className="p-4">
                                        <p className="text-[18px] leading-relaxed text-[#2D2A26] italic opacity-90 serif">{result.resonance}</p>
                                    </div>
                                </section>
                            </div>

                            <div className="p-20 bg-[#2D2A26] text-[#FDFBF7] text-center shadow-2xl relative overflow-hidden group rounded-sm">
                                <p className="text-3xl md:text-5xl leading-relaxed mb-8 italic font-light relative z-10 serif">
                                    <span className="relative z-10">“{result.quote}”</span>
                                </p>
                                <div className="text-[11px] text-[#9281C3] tracking-[1em] uppercase font-bold relative z-10">— THE CREDO —</div>
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-px bg-black/5">
                                <div className="p-14 bg-[#FDFBF7]">
                                    <div className="text-[11px] font-bold mb-4 uppercase tracking-[0.4em] text-[#9281C3] font-sans">核心焦虑诊断 / ANXIETY</div>
                                    <div className="text-[16px] text-gray-600 leading-relaxed serif">{result.anxiety}</div>
                                </div>
                                <div className="p-14 bg-[#FDFBF7]">
                                    <div className="text-[11px] font-bold mb-4 uppercase tracking-[0.4em] text-gray-400 font-sans">系统阴影分析 / SHADOW</div>
                                    <div className="text-[16px] text-gray-700 leading-relaxed serif">{result.shadow}</div>
                                </div>
                            </div>

                            <div className="pt-24 flex flex-col gap-6 items-center">
                                <button onClick={() => window.location.reload()} className="px-14 py-7 border border-black/40 text-[12px] font-bold tracking-[0.7em] uppercase hover:bg-[#9281C3] hover:text-white transition-all shadow-xl active:scale-95">再次扫描图谱 / RESTART</button>
                                <p className="text-[10px] text-center text-gray-400 tracking-[0.6em] uppercase opacity-60 font-mono">© 2026 Art Prototype Project by @Emergence_Lab</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
