                    setScores(newScores);
                    
                    if (currentQ < QUESTIONS.length - 1) {
                        setCurrentQ(prev => prev + 1);
                        setIsFadeEffect(false);
                        window.scrollTo(0,0);
                    } else {
                        const sorted = Object.entries(newScores).sort((a,b) => b[1] - a[1]);
                        setResult(ARTISTS[sorted[0][0]] || ARTISTS.DA_VINCI);
                        setStep('result');
                        window.scrollTo(0,0);
                    }
                }, 100); 
            };

            const handleBack = () => {
                if (history.length === 0) return setStep('welcome');
                setIsFadeEffect(true);
                setTimeout(() => {
                    const last = history[history.length - 1];
                    setScores(last.scores);
                    setCurrentQ(last.currentQ);
                    setHistory(prev => prev.slice(0, -1));
                    setIsFadeEffect(false);
                }, 100);
            };

            useEffect(() => {
                if (step === 'result' && result && radarCanvas.current) {
                    if (chartRef.current) chartRef.current.destroy();
                    const ctx = radarCanvas.current.getContext('2d');
                    chartRef.current = new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['独创', '理性', '感官', '虚空', '意志'],
                            datasets: [{
                                data: result.stats,
                                backgroundColor: 'rgba(119, 155, 149, 0.2)',
                                borderColor: '#779B95',
                                borderWidth: 2,
                                pointRadius: 0
                            }]
                        },
                        options: {
                            responsive: true,
                            scales: { r: { ticks: { display: false }, min: 0, max: 100 } },
                            plugins: { legend: { display: false } }
                        }
                    });
                }
            }, [step, result]);

            return (
                <div className="min-h-screen flex flex-col relative overflow-y-auto">
                    <div className="tech-header">
                        <div>Experimental Soul Unit V2.5</div>
                        <div className="text-right">Ref: 2026-X01</div>
                    </div>

                    {step === 'welcome' && (
                        <div className="flex-grow flex flex-col items-center justify-center px-6 py-10 animate-fade">
                            <h1 className="main-title serif text-center mb-4">艺术原型</h1>
                            <h2 className="text-xl serif text-gray-400 tracking-[0.4em] mb-10 text-center">人格图谱测试</h2>
                            <div className="w-16 h-px bg-[#333] mb-10"></div>
                            <p className="max-w-xs text-xs text-gray-400 leading-relaxed text-center mb-12 uppercase">
                                艺术不只是修辞，它是你在废墟上重建自我的证据。
                            </p>
                            <button onClick={() => setStep('quiz')} className="btn-action">开始扫描 / START</button>
                        </div>
                    )}

                    {step === 'quiz' && (
                        <div className="max-w-xl mx-auto w-full px-6 py-10 animate-fade flex-grow">
                            <div className="flex justify-between items-center mb-10">
                                <button onClick={handleBack} className="text-[10px] uppercase text-gray-400 font-bold tracking-widest">返回 / BACK</button>
                                <span className="text-[10px] font-mono text-brand-teal uppercase">Node: {currentQ + 1} / 30</span>
                            </div>
                            <div className={`transition-opacity duration-200 ${isFadeEffect ? 'opacity-0' : 'opacity-100'}`}>
                                <h3 className="text-2xl serif mb-10 leading-snug text-[#2D2A26]">{QUESTIONS[currentQ]?.text}</h3>
                                <div className="space-y-1">
                                    {QUESTIONS[currentQ]?.options.map((opt, i) => (
                                        <button key={i} onClick={() => handleAnswer(opt.type)} className="option-btn">
                                            <span className="text-[10px] mr-4 opacity-30 font-bold">0{i+1}</span>
                                            <span className="text-sm md:text-base text-gray-600">{opt.text}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {step === 'result' && result && (
                        <div className="flex-grow flex flex-col items-center px-6 py-10 centered-container bg-white">
                            <div className="max-w-md w-full animate-fade space-y-6">
                                <div className="text-center space-y-2 mb-8">
                                    <div className="text-[10px] font-bold text-[#779B95] uppercase tracking-widest border border-[#779B95]/30 inline-block px-3 py-1 rounded">采样档案库已补完</div>
                                    <h2 className="text-5xl font-bold serif pt-4">{result.name}</h2>
                                    <p className="text-sm text-gray-400 italic tracking-widest">{result.sub}</p>
                                </div>

                                <div className="info-card">
                                    <h4 className="text-[10px] font-bold opacity-30 uppercase mb-4 tracking-widest">01 / 审美底色报告</h4>
                                    <p className="text-lg italic serif text-gray-500 mb-4 leading-relaxed">“{result.identity}”</p>
                                    <p className="text-sm text-gray-600 leading-loose mb-6">{result.desc}</p>
                                    <div className="chart-container">
                                        <canvas ref={radarCanvas}></canvas>
                                    </div>
                                    <div className="mt-4 pt-4 border-t border-gray-50">
                                        <span className="text-[9px] font-bold text-[#779B95] block mb-1">核心执念逻辑</span>
                                        <p className="text-[11px] text-gray-400 italic">{result.logic}</p>
                                    </div>
                                </div>

                                <div className="info-card">
                                    <h4 className="text-[10px] font-bold opacity-30 uppercase mb-4 tracking-widest">02 / 实验档案：物料与阴影</h4>
                                    <div className="flex flex-wrap mb-4">
                                        {result.material.split('、').map((m, i) => <span key={i} className="tag-pill">{m}</span>)}
                                    </div>
                                    <div className="space-y-4">
                                        <div className="p-3 bg-red-50/30 border-l-2 border-red-100">
                                            <span className="text-[9px] font-bold text-[#E89980] block mb-1">心理阴影 / Shadow</span>
                                            <p className="text-[11px] text-gray-500 leading-relaxed">{result.shadow}</p>
                                        </div>
                                        <div className="p-3 bg-teal-50/30 border-l-2 border-teal-100">
                                            <span className="text-[9px] font-bold text-[#779B95] block mb-1">焦虑点 / Anxiety</span>
                                            <p className="text-[11px] text-gray-500 leading-relaxed">{result.anxiety}</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="info-card">
                                    <h4 className="text-[10px] font-bold opacity-30 uppercase mb-4 tracking-widest">03 / 代表作品坐标</h4>
                                    <div className="space-y-2">
                                        {result.works.map((w, i) => (
                                            <div key={i} className="text-xs text-gray-700 font-bold serif flex items-center gap-2">
                                                <div className="w-1 h-1 bg-[#779B95] rounded-full"></div>
                                                {w}
                                            </div>
                                        ))}
                                    </div>
                                </div>

                                {/* 新增：知识补完计划 */}
                                <div className="info-card">
                                    <div className="flex justify-between items-center mb-4">
                                        <h4 className="text-[10px] font-bold opacity-30 uppercase tracking-widest">04 / 深度档案：推荐阅读</h4>
                                        <div className="text-[9px] px-2 py-0.5 bg-gray-100 text-gray-400 rounded">ACADEMIC_FILE</div>
                                    </div>
                                    <div className="space-y-1">
                                        {result.books.map((book, i) => (
                                            <div key={i} className="book-item">
                                                <div className="book-icon">BOOK</div>
                                                <div>
                                                    <p className="text-[13px] font-bold text-gray-800">{book}</p>
                                                    <p className="text-[9px] text-gray-400 uppercase tracking-tighter">Reference Reading</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                    <div className="mt-4 p-4 bg-[#F8F9F5] rounded-sm text-[11px] text-gray-500 italic leading-relaxed border border-gray-100">
                                        “如果你想更彻底地理解这种审美逻辑，系统建议你从以上书籍中寻找切口。接触其核心创作物料‘{result.material.split('、')[0]}’，或许能帮你缓解近期的系统性波动。”
                                    </div>
                                </div>

                                <div className="py-10 text-center space-y-8">
                                    <p className="text-2xl italic serif text-gray-400 px-4 leading-relaxed">“{result.quote}”</p>
                                    <div className="pt-4 flex flex-col items-center gap-4">
                                        <button onClick={() => window.location.reload()} className="btn-action">重来一次 / RESTART</button>
                                        <p className="text-[9px] text-gray-300 font-mono tracking-widest uppercase">End of Report</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="tech-header border-t py-4 mt-auto">
                        <div className="max-w-[180px] leading-relaxed opacity-40 lowercase">
                            重建主体性的最后存证
                        </div>
                        <div className="text-right opacity-40">© 2026 ART PROTOTYPE</div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
