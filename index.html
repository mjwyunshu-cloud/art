                                    <h4 className="text-[10px] font-bold opacity-30 uppercase mb-3">03 / 代表作品</h4>
                                    <div className="space-y-1">
                                        {result.works.map((w, i) => <div key={i} className="text-xs text-gray-700 font-bold serif">• {w}</div>)}
                                    </div>
                                </div>

                                <div className="py-10 text-center space-y-6">
                                    <p className="text-xl italic serif text-gray-400 px-4">“{result.quote}”</p>
                                    <button onClick={() => window.location.reload()} className="btn-action">重来一次</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="tech-header border-t py-4 mt-auto">
                        <div className="max-w-[180px] leading-relaxed opacity-40 lowercase">
                            重建主体性的最后存证
                        </div>
                        <div className="text-right opacity-40">© 2026 ART PROTOTYPE</div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
