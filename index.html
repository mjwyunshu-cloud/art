        :root {
            --bg-color: #F8F9F5; 
            --brand-teal: #779B95;
            --brand-coral: #E89980;
            --text-main: #333333; 
            --line-color: #E2E8E4;
            --tech-font: 'Inter', ui-monospace, monospace;
        }

        body {
            font-family: 'Noto Serif SC', serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            overflow-x: hidden;
        }

        .tech-header {
            border-bottom: 1px solid var(--line-color);
            padding: 2rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            font-family: var(--tech-font);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .tech-label { font-weight: 800; font-size: 13px; color: var(--brand-teal); }
        .tech-sub { font-size: 9px; color: #999; margin-top: 2px; }

        .stats-overlay {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--line-color);
            padding: 1.5rem;
            width: 200px;
            font-family: var(--tech-font);
            box-shadow: 0 10px 30px rgba(0,0,0,0.02);
        }

        .stats-title {
            border-bottom: 1.5px solid #333;
            padding-bottom: 6px;
            margin-bottom: 10px;
            font-weight: 800; font-size: 11px;
            letter-spacing: 0.1em;
        }

        .stat-row {
            display: flex; justify-content: space-between;
            font-size: 9px; margin-bottom: 5px; color: #777;
        }

        .stat-val { color: #333; font-weight: 600; }

        .main-title {
            font-size: clamp(4rem, 10vw, 7rem);
            font-weight: 900; color: #2D3A38;
            letter-spacing: -0.01em; line-height: 0.9;
        }

        .sub-title {
            font-size: clamp(1.2rem, 3vw, 2.2rem);
            color: var(--brand-teal);
            letter-spacing: 0.4em; margin-top: 0.5rem; font-weight: 300;
        }

        .option-btn {
            border-bottom: 1px solid var(--line-color);
            padding: 1.2rem 0.5rem;
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative; width: 100%; text-align: left;
        }

        .option-btn:hover {
            padding-left: 1.2rem;
            background: rgba(119, 155, 149, 0.04);
            border-bottom-color: var(--brand-teal);
        }

        .option-btn.selected { color: var(--brand-teal); padding-left: 1.5rem; font-weight: bold; }

        .btn-action {
            border: 1.5px solid var(--brand-teal);
            padding: 0.8rem 3.5rem;
            font-family: var(--tech-font);
            font-weight: 800; font-size: 11px;
            color: var(--brand-teal);
            letter-spacing: 0.3em; text-transform: uppercase;
            transition: all 0.3s;
        }

        .btn-action:hover { background: var(--brand-teal); color: white; }

        .tech-footer {
            border-top: 1px solid var(--line-color);
            padding: 2.5rem 3rem; margin-top: 4rem;
            display: flex; justify-content: space-between;
            align-items: center; font-size: 10px;
            color: #999; font-family: var(--tech-font);
        }

        .animate-fade { animation: fadeIn 0.8s forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .dot-cloud { animation: float 10s ease-in-out infinite; }
        @keyframes float { 
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(-10px, -20px); }
        }

        .back-btn {
            font-family: var(--tech-font); font-size: 10px;
            letter-spacing: 0.2em; color: #999;
            display: flex; align-items: center; transition: all 0.3s;
            text-transform: uppercase;
        }
        .back-btn:hover { color: var(--brand-teal); }

        .info-card { background: white; border: 1px solid var(--line-color); padding: 1.5rem; transition: all 0.3s; }
        .info-card:hover { border-color: var(--brand-teal); transform: translateY(-2px); }
        .tag-pill {
            display: inline-block; padding: 2px 8px; font-size: 9px;
            background: #F0F4F2; color: #779B95; margin-right: 4px; border-radius: 2px;
            font-family: var(--tech-font); font-weight: 700;
        }
        .book-cover {
            width: 40px; height: 56px; background: #EEE; border-left: 3px solid var(--brand-teal);
            display: flex; align-items: center; justify-content: center; font-size: 8px;
            color: #AAA; text-align: center; padding: 4px;
        }
    </style>
</head>

                { text: "能够无限分裂、在每一个时代都变换一副面孔的解构者", type: "PICASSO" }
            ] },
            { id: 26, text: "面对一份庞大的、前所未见的实验数据图，你会：", options: [
                { text: "伸手去触摸那些带有质感的线条，试图感受画家的指温", type: "VAN_GOGH" }, 
                { text: "后退几步，观察整个图表构图在数学意义上的平衡感", type: "DA_VINCI" },
                { text: "闭上眼，去感受图表所营造的光影氛围而非具体内容", type: "MONET" },
                { text: "寻找任何拼贴的痕迹，试图解构这份数据的所有来源", type: "PICASSO" }
            ] },
            { id: 27, text: "关于“失败”，系统给出的最优解析方案是：", options: [
                { text: "失败不过是计算比例时出了一点可以修正的微小偏差", type: "DA_VINCI" }, 
                { text: "是必须生生吞咽下去的、令人感到发狂的生命磨灭", type: "VAN_GOGH" },
                { text: "失败是画面在层层涂抹后所呈现出的、最有深度的厚度", type: "RICHTER" },
                { text: "失败是一场绝妙的黑色幽默，是创作最好的恶搞素材", type: "CATTELAN" }
            ] },
            { id: 28, text: "如果你在庄严的圣殿里突然听到一阵放肆的大笑：", options: [
                { text: "条件反射地去分析他面部肌肉的走向与发声的物理结构", type: "DA_VINCI" }, 
                { text: "想和他一起放声大笑，去拆解这种权威所制造的荒诞", type: "CATTELAN" },
                { text: "觉得这种笑声造成了神圣空间中某种支离破碎的断裂感", type: "PICASSO" },
                { text: "觉得这笑声的震颤中藏着对这个世界最深层的精神焦虑", type: "VAN_GOGH" }
            ] },
            { id: 29, text: "如果你能短暂拥有一个绝对“真空”的时刻，你会：", options: [
                { text: "彻底屏蔽掉所有外界信号，独享这种纯粹的虚无深渊", type: "KAPOOR" }, 
                { text: "在真空中让某种纯粹的光波进行全身心的洗礼与进化", type: "TURRELL" },
                { text: "静坐在窗前，捕捉那抹最微小也最静谧的、凝固的光", type: "VERMEER" },
                { text: "在漫长的海平线前，凝固掉所有正在衰减的时间刻度", type: "SUGIMOTO" }
            ] },
            { id: 30, text: "实验结束，如果你的人格采样即将消失，你会留下：", options: [
                { text: "一串无人能解的、极其精密的、关于灵魂维度的坐标", type: "DA_VINCI" }, 
                { text: "海面上反射出的那抹金色的、转瞬即逝的光斑残影", type: "MONET" },
                { text: "一个荒诞、梦幻且不可思议的、关于潜意识的奇迹", type: "DALI" },
                { text: "一个被精确分类、打上科学标签并封存的生命标本", type: "HIRST" }
            ] }
        ];

        function App() {
            const [step, setStep] = useState('welcome');
            const [currentQ, setCurrentQ] = useState(0);
            const [scores, setScores] = useState({});
            const [history, setHistory] = useState([]); 
            const [result, setResult] = useState(null);
            const [selectedIdx, setSelectedIdx] = useState(null);
            const [isTransitioning, setIsTransitioning] = useState(false);
            const [isFadeEffect, setIsFadeEffect] = useState(false); 

            const radarCanvas = useRef(null);
            const chartRef = useRef(null);

            const dotsData = useMemo(() => {
                return [...Array(140)].map((_, i) => {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 180 + Math.pow(Math.random(), 0.6) * 750; 
                    return {
                        id: i, x: 500 + Math.cos(angle) * dist, y: 500 + Math.sin(angle) * dist,
                        size: 0.8 + Math.random() * 4,
                        opacity: 0.15 + Math.random() * 0.35,
                        color: Math.random() > 0.85 ? 'var(--brand-coral)' : 'var(--brand-teal)',
                        originX: 500 + Math.cos(angle) * dist,
                        originY: 500 + Math.sin(angle) * dist
                    };
                });
            }, []);

            const [dots, setDots] = useState(dotsData);

            const handleAnswer = (type, index, e) => {
                if (isTransitioning) return;
                
                const rect = e.currentTarget.getBoundingClientRect();
                const x = (rect.left + rect.width / 2) / window.innerWidth * 1000;
                const y = (rect.top + rect.height / 2) / window.innerHeight * 1000;
                
                setDots(prev => prev.map(d => ({
                    ...d,
                    x: d.originX + (x - d.originX) * 0.05,
                    y: d.originY + (y - d.originY) * 0.05,
                    opacity: 0.6
                })));

                setSelectedIdx(index);
                setIsTransitioning(true);
                
                setTimeout(() => {
                    setIsFadeEffect(true);
                    setTimeout(() => {
                        setDots(dotsData);
                        setHistory(prev => [...prev, { scores, currentQ }]);
                        const newScores = { ...scores, [type]: (scores[type] || 0) + 1 };
                        setScores(newScores);
                        
                        if (currentQ < QUESTIONS.length - 1) {
                            setCurrentQ(prev => prev + 1);
                            setSelectedIdx(null);
                            setIsFadeEffect(false);
                            setIsTransitioning(false);
                            window.scrollTo({ top: 0, behavior: 'auto' });
                        } else {
                            const sorted = Object.entries(newScores).sort((a,b) => b[1] - a[1]);
                            setResult(ARTISTS[sorted[0][0]] || ARTISTS.DA_VINCI);
                            setStep('result');
                            window.scrollTo({ top: 0, behavior: 'auto' });
                        }
                    }, 150); 
                }, 50); 
            };

            const handleBack = () => {
                if (history.length === 0) {
                    setStep('welcome');
                    return;
                }
                setIsFadeEffect(true);
                setTimeout(() => {
                    const lastState = history[history.length - 1];
                    setScores(lastState.scores);
                    setCurrentQ(lastState.currentQ);
                    setHistory(prev => prev.slice(0, -1));
                    setSelectedIdx(null);
                    setIsFadeEffect(false);
                    setIsTransitioning(false);
                }, 150);
            };

            useEffect(() => {
                if (step === 'result' && result && radarCanvas.current) {
                    if (chartRef.current) chartRef.current.destroy();
                    const ctx = radarCanvas.current.getContext('2d');
                    chartRef.current = new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['独创', '理性', '感官', '虚空', '意志'],
                            datasets: [{
                                data: result.stats,
                                backgroundColor: 'rgba(119, 155, 149, 0.12)',
                                borderColor: '#779B95',
                                borderWidth: 1.5,
                                pointRadius: 0,
                            }]
                        },
                        options: {
                            scales: {
                                r: {
                                    angleLines: { color: 'rgba(0,0,0,0.05)' },
                                    grid: { color: 'rgba(0,0,0,0.05)' },
                                    ticks: { display: false },
                                    min: 0, max: 100,
                                    pointLabels: { font: { family: "'Inter', sans-serif", size: 9 }, color: '#999' }
                                }
                            },
                            plugins: { legend: { display: false } }
                        }
                    });
                }
            }, [step, result]);

            return (
                <div className="min-h-screen relative flex flex-col overflow-x-hidden bg-[#F8F9F5]">
                    {/* 技术化页眉 */}
                    <div className="tech-header">
                        <div>
                            <div className="tech-label font-bold">Experimental Soul Unit</div>
                            <div className="tech-sub font-mono opacity-50 uppercase tracking-widest">Classification: Art-Driven Genome V2.5</div>
                        </div>
                        <div className="text-right">
                            <div className="tech-sub font-mono opacity-50 uppercase">DEPT: Psych-Analysis_Lab</div>
                            <div className="tech-sub font-mono opacity-50 uppercase">REF: 2026-X01_NODE</div>
                        </div>
                    </div>

                    {step === 'welcome' && (
                        <div className="animate-fade flex-grow flex flex-col relative overflow-hidden px-8 pt-16 md:pt-28">
                            <div className="flex flex-col lg:flex-row justify-between items-start z-10">
                                <div className="space-y-6">
                                    <h1 className="main-title serif">艺术原型</h1>
                                    <h2 className="sub-title serif">人格图谱测试</h2>
                                    <div className="h-[1.5px] w-64 bg-[#333] mt-10"></div>
                                    <p className="max-w-md text-xs text-gray-400 leading-loose tracking-[0.2em] pt-8 uppercase font-sans">
                                        “Art is not just rhetoric, it is the last evidence of your subjectivity rebuilt on the ruins of civilization.”
                                    </p>
                                    <div className="pt-12">
                                        <button onClick={() => setStep('quiz')} className="btn-action">启动扫描 / START SCAN</button>
                                    </div>
                                </div>

                                <div className="hidden lg:block relative mr-12 mt-[-50px]">
                                    <svg width="600" height="600" viewBox="0 0 1000 1000" className="dot-cloud">
                                        {dots.map(dot => (
                                            <circle key={dot.id} cx={dot.x} cy={dot.y} r={dot.size} fill={dot.color} opacity={dot.opacity} />
                                        ))}
                                        <circle cx="500" cy="500" r="12" fill="#333" />
                                        <path d="M500 515 Q500 750 540 850" stroke="#779B95" strokeWidth="1" fill="none" opacity="0.4" />
                                    </svg>
                                    <div className="absolute top-1/2 right-0 translate-x-4 stats-overlay">
                                        <div className="stats-title">GENOME STATS</div>
                                        <div className="stat-row"><span>AESTHETIC_V</span> <span className="stat-val">88.42%</span></div>
                                        <div className="stat-row"><span>RESONANCE</span> <span className="stat-val">STABLE</span></div>
                                        <div className="stat-row"><span>NODE_DENSITY</span> <span className="stat-val">14.2k</span></div>
                                    </div>
                                </div>
                            </div>

                            <div className="mt-auto grid grid-cols-3 border-t border-b border-gray-200 py-10 mb-8">
                                <div className="text-center border-r border-gray-200">
                                    <div className="text-4xl md:text-5xl font-bold text-gray-800 font-sans tracking-tighter">30</div>
                                    <div className="text-[9px] uppercase tracking-widest text-gray-400 mt-2 font-sans font-bold">Samples Identified</div>
                                </div>
                                <div className="text-center border-r border-gray-200">
                                    <div className="text-4xl md:text-5xl font-bold text-gray-800 font-sans tracking-tighter">20</div>
                                    <div className="text-[9px] uppercase tracking-widest text-gray-400 mt-2 font-sans font-bold">Archetype Class</div>
                                </div>
                                <div className="text-center">
                                    <div className="text-4xl md:text-5xl font-bold font-sans tracking-tighter" style={{color: '#E89980'}}>01</div>
                                    <div className="text-[9px] uppercase tracking-widest text-gray-400 mt-2 font-sans font-bold">Final Evidence</div>
                                </div>
                            </div>
                        </div>
                    )}

                    {step === 'quiz' && (
                        <div className="flex-grow flex flex-col max-w-4xl mx-auto w-full px-8 py-16 md:py-24 animate-fade">
                            <div className="flex justify-between items-center mb-16">
                                <div className="flex items-center space-x-6">
                                    <button onClick={handleBack} className="back-btn group">
                                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                                        Prev_Node
                                    </button>
                                    <div className="text-[10px] font-bold tracking-[0.4em] text-brand-teal font-sans uppercase">
                                        Sampling_Node: {String(currentQ + 1).padStart(2, '0')} / {QUESTIONS.length}
                                    </div>
                                </div>
                                <div className="h-px flex-grow mx-6 bg-gray-200"></div>
                                <div className="text-[9px] font-sans text-gray-300 tracking-widest uppercase font-bold">In_Progress_Soul_Sampling</div>
                            </div>

                            <div className={`transition-all duration-400 ${isFadeEffect ? 'opacity-0 translate-y-2' : 'opacity-100 translate-y-0'}`}>
                                <h3 className="text-2xl md:text-4xl font-medium serif mb-20 leading-snug text-gray-800">
                                    {QUESTIONS[currentQ]?.text}
                                </h3>

                                <div className="grid grid-cols-1 gap-2">
                                    {QUESTIONS[currentQ]?.options.map((opt, i) => (
                                        <button 
                                            key={i}
                                            onClick={(e) => handleAnswer(opt.type, i, e)}
                                            disabled={isTransitioning}
                                            className={`option-btn flex items-start group ${selectedIdx === i ? 'selected' : ''}`}
                                        >
                                            <span className="font-sans text-[10px] mt-1.5 mr-6 opacity-30 font-bold">0{i+1}</span>
                                            <span className="text-base md:text-lg text-gray-600 group-hover:text-black transition-colors">{opt.text}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {step === 'result' && result && (
                        <div className="max-w-5xl mx-auto animate-fade space-y-12 pb-32 relative px-8 py-12 flex-grow">
                            <div className="text-center space-y-4">
                                <div className="text-[10px] font-bold font-mono tracking-[0.5em] text-[#779B95] uppercase border border-[#779B95]/20 inline-block px-5 py-1.5 rounded-sm">Diagnostic Profile Finalized</div>
                                <h2 className="text-5xl md:text-8xl font-bold tracking-tighter text-[#2D3A38] serif">{result.name}</h2>
                                <p className="text-lg md:text-2xl text-gray-400 italic tracking-[0.4em] uppercase font-light">{result.sub}</p>
                            </div>

                            {/* 01: 核心诊断卡片 */}
                            <div className="bg-white border border-gray-100 relative grid md:grid-cols-5 gap-0 shadow-sm overflow-hidden">
                                <div className="md:col-span-3 p-10 md:p-14 space-y-10 border-r border-gray-50">
                                    <section>
                                        <h4 className="text-[11px] font-bold font-mono uppercase tracking-[0.3em] opacity-40 text-[#779B95] mb-6">01 / 知觉诊断：精神底色分析</h4>
                                        <p className="text-2xl leading-relaxed text-gray-500 italic font-medium serif mb-8">“{result.identity}”</p>
                                        <p className="text-[15px] leading-loose text-gray-600 border-l-2 border-[#779B95]/20 pl-8 opacity-90">{result.desc}</p>
                                    </section>
                                    <section className="pt-8 border-t border-gray-50">
                                        <h4 className="text-[11px] font-bold font-mono uppercase tracking-[0.3em] opacity-40 text-[#779B95] mb-4">核心执念逻辑映射</h4>
                                        <p className="text-[15px] leading-loose text-gray-500 italic serif">{result.logic}</p>
                                    </section>
                                </div>
                                <div className="md:col-span-2 bg-[#FBFBF9] flex flex-col items-center justify-center p-12">
                                    <div className="w-full aspect-square relative mb-8">
                                        <canvas ref={radarCanvas}></canvas>
                                    </div>
                                    <div className="text-center">
                                        <div className="text-[10px] font-bold tracking-[0.5em] text-gray-300 font-mono">SUBJECT_GENOME_VISUALIZATION</div>
                                        <div className="text-[9px] text-gray-400 mt-2 font-mono opacity-50 italic uppercase">System Unit: ART_GEN_2026_FINAL</div>
                                    </div>
                                </div>
                            </div>

                            {/* 02 & 03: 物料清单与历史坐标 */}
                            <div className="grid md:grid-cols-2 gap-8">
                                <div className="info-card flex flex-col space-y-6">
                                    <div className="flex items-center justify-between border-b border-gray-50 pb-3">
                                        <h3 className="text-[11px] font-bold font-mono uppercase tracking-[0.3em] opacity-40">02 / 创作介质与物料清单</h3>
                                        <span className="text-[10px] mono opacity-20">MAT_01</span>
                                    </div>
                                    <div className="flex flex-wrap gap-2">
                                        {result.material.split('、').map((m, i) => (
                                            <span key={i} className="tag-pill">{m}</span>
                                        ))}
                                    </div>
                                    <div className="space-y-4 pt-2">
                                        <div>
                                            <span className="text-[9px] font-bold font-mono uppercase block mb-1 text-[#E89980]">心理阴影 / Shadow</span>
                                            <p className="text-[12px] text-gray-500 leading-relaxed font-sans">{result.shadow}</p>
                                        </div>
                                        <div>
                                            <span className="text-[9px] font-bold font-mono uppercase block mb-1 text-[#779B95]">审美焦虑 / Anxiety</span>
                                            <p className="text-[12px] text-gray-500 leading-relaxed font-sans">{result.anxiety}</p>
                                        </div>
                                    </div>
                                </div>

                                <div className="info-card flex flex-col space-y-6">
                                    <div className="flex items-center justify-between border-b border-gray-50 pb-3">
                                        <h3 className="text-[11px] font-bold font-mono uppercase tracking-[0.3em] opacity-40">03 / 代表性时空坐标节点</h3>
                                        <span className="text-[10px] mono opacity-20">HIST_01</span>
                                    </div>
                                    <div className="space-y-4">
                                        <span className="text-[9px] font-bold font-mono uppercase block text-gray-400">Key Works Reference</span>
                                        <div className="grid grid-cols-1 gap-3">
                                            {result.works.map((w, i) => (
                                                <div key={i} className="flex items-center space-x-3 text-[13px] text-gray-700">
                                                    <div className="w-1.5 h-1.5 bg-brand-teal rounded-full"></div>
                                                    <span className="font-bold serif">{w}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* 04: 学术补完 */}
                            <div className="info-card">
                                <div className="flex items-center justify-between border-b border-gray-50 pb-4 mb-6">
                                    <h3 className="text-[11px] font-bold font-mono uppercase tracking-[0.3em] opacity-40">04 / 学术补完：深度档案阅读</h3>
                                    <div className="flex space-x-2">
                                        <div className="w-1.5 h-1.5 bg-brand-teal rounded-full"></div>
                                        <div className="w-1.5 h-1.5 bg-brand-teal rounded-full opacity-30"></div>
                                    </div>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    {result.books.map((b, i) => (
                                        <div key={i} className="flex items-center space-x-5 group cursor-default">
                                            <div className="book-cover group-hover:bg-brand-teal group-hover:text-white transition-all">READ FILE</div>
                                            <div>
                                                <p className="text-[14px] font-bold serif text-gray-800">{b}</p>
                                                <p className="text-[10px] font-mono text-gray-400 mt-1 uppercase tracking-widest">Recommended Reference</p>
                                            </div>
                                        </div>
                                    ))}
                                    <div className="md:col-span-2 p-6 bg-[#F8F9F5] rounded-sm mt-4 border-l-4 border-[#779B95]">
                                        <div className="flex items-start space-x-4">
                                            <div className="text-2xl text-brand-teal opacity-30 font-serif leading-none">“</div>
                                            <p className="text-[13px] text-gray-500 italic leading-loose font-sans">
                                                采样信号报告：你的审美基因倾向于在 {result.name} 的叙事中寻找终极答案。系统建议通过深入研究其使用的“{result.material.split('、')[0]}”等介质，去中和潜意识中由于“{result.anxiety.slice(0,10)}...”而引发的系统性波动。
                                            </p>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* 最后语录 */}
                            <div className="py-24 text-center space-y-12">
                                <div className="space-y-4">
                                    <p className="text-4xl md:text-5xl leading-relaxed italic font-light serif text-gray-400 px-10">“{result.quote}”</p>
                                    <div className="text-[10px] tracking-[0.8em] font-mono uppercase opacity-30">— 大师最后真言 / THE_FINAL_CODE —</div>
                                </div>
                                <div className="pt-8 flex flex-col items-center space-y-4">
                                    <button onClick={() => window.location.reload()} className="btn-action">重新启动扫描 / RE-SCAN GENOME</button>
                                    <p className="text-[9px] font-mono text-gray-300 opacity-50 uppercase tracking-[0.3em]">End of Diagnostic Report: Unit 2026-X01</p>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="tech-footer">
                        <div className="max-w-[280px] leading-relaxed opacity-60 font-sans">
                            “艺术不仅仅是修辞，它是你在文明废墟上重建主体性的最后存证。”
                        </div>
                        <div className="text-right">
                            <div className="font-bold tracking-widest font-mono uppercase">SYSTEM V.2.5</div>
                            <div className="opacity-40 mt-1 uppercase font-bold font-mono">© 2026 ART PROTOTYPE PROJECT</div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
